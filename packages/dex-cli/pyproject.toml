[project]
name = "dex-cli"
version = "0.1.0"
description = "Dex — CLI client."
requires-python = ">=3.13"
dependencies = [
	"typer>=0.24",
	"rich>=14",
	"httpx>=0.28",
	"questionary>=2",
]

[project.scripts]
dex = "dex_cli.cli:app"

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
